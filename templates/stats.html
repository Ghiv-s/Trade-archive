<!DOCTYPE html>
<html>
<head>
    <title>Statistics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<div class="container mt-5">

    <!-- Форма фильтрации -->
    <div class="card bg-secondary p-4 mb-4">
        <h2 class="mb-4">Statistics</h2>

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">Instrument</label><br>
                <input type="radio" name="Instrument" value="DAX" checked> DAX
            </div>

            <div class="mb-3">
                <label class="form-label">Gap</label><br>
                <input type="radio" name="Gap" value="Gap Up" required> Gap Up
                <input type="radio" name="Gap" value="Gap Down"> Gap Down
            </div>

            <div class="mb-3">
                <label class="form-label">1 Bar</label><br>
                <input type="radio" name="1 Bar" value="Positive" required> Positive
                <input type="radio" name="1 Bar" value="Negative"> Negative
            </div>

            <div class="mb-3">
                <label class="form-label">2 Bar</label><br>
                <input type="radio" name="2 Bar" value="Positive" required> Positive
                <input type="radio" name="2 Bar" value="Negative"> Negative
            </div>

            <div class="mb-3">
                <label class="form-label">2 Bar Structure</label><br>
                <input type="radio" name="2 Bar Structure" value="Inside" required> Inside
                <input type="radio" name="2 Bar Structure" value="Outside"> Outside
            </div>

            <button type="submit" class="btn btn-primary">Show Stats</button>
            <a href="/" class="btn btn-light">Back</a>

        </form>
    </div>

    <!-- Результаты -->
    <div class="card bg-secondary p-4">
        <h4>Total Matches: {{ total }}</h4>
        <h4>Percentage: {{ "%.2f"|format(percentage) }}%</h4>

        <hr>

        <h5>Results:</h5>
        <div class="row">
            {% for r in results %}
            <div class="col-md-3 mb-3">
                <div class="card bg-dark text-light">
                    <a href="{{ url_for('static', filename='images/' + r.filename) }}" target="_blank">
                        <img src="{{ url_for('static', filename='images/' + r.filename) }}" 
                             class="card-img-top" alt="screenshot">
                    </a>
                    <div class="card-body">
                        <p class="card-text">{{ r.date }}</p>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

</div>

</body>
</html>
